# docker/nginx/nginx.conf

upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name api.foodrevolut.abhayvii.dev  www.api.foodrevolut.abhayvii.dev;

    #ZeroSSL domain  verification  
    location /.well-known/acme-challenge/{
        root var/www/certbot;
    }
    location / {
        return 301  https://$host$request_uri;
    }
}

# ── HTTPS server ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.foodrevolut.abhayvii.dev www.api.foodrevolut.abhayvii.dev;

    # ── SSL certificates ─────────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/foodrevolut/fullchain.crt;
    ssl_certificate_key /etc/ssl/foodrevolut/private.key;

    # ── SSL settings ─────────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff";
    add_header X-Frame-Options         "DENY";
    add_header Referrer-Policy         "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── WebSocket ────────────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://django;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
        proxy_redirect off;
    }

    # ── API + Django ─────────────────────────────────────────────────────────
    location / {
        proxy_pass http://django;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        client_max_body_size 10M;
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
        proxy_redirect        off;
    }

    # ── Health check ─────────────────────────────────────────────────────────
    location /health/ {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }
}